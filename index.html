<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>幕末うさぎ歴史クイズ</title>
<style>
  :root{--bg:#fff7e8;--ink:#2b2118;--main:#ffb547;--sub:#6f4b2a;--good:#2e9d68;--bad:#d94a4a;--card:#ffffff;--line:#ead6b9;}
  *{box-sizing:border-box} html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fff7e8,#fff1d6);}
  button,a{font:inherit} .app{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:16px;}
  .shell{width:min(1100px,100%);background:rgba(255,255,255,.82);border:3px solid #f0d4a6;border-radius:28px;box-shadow:0 18px 45px rgba(92,62,24,.16);overflow:hidden;}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:#fff3dc;border-bottom:2px solid #f1d7ad;}
  .brand{display:flex;align-items:center;gap:10px}.brand img{width:56px;height:56px;object-fit:contain}.brand h1{font-size:clamp(20px,3vw,34px);margin:0;line-height:1.1}.brand small{display:block;color:#7a5b39;font-weight:700;margin-top:2px}.topBtns{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .miniBtn{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;background:#fff;border:2px solid #e9c98e;border-radius:999px;padding:9px 13px;color:#4b351f;font-weight:900;box-shadow:0 3px 0 #d3ad68;cursor:pointer}.miniBtn:active{transform:translateY(2px);box-shadow:0 1px 0 #d3ad68}.miniBtn.adv{opacity:.72}
  main{padding:18px}.home{display:grid;grid-template-columns:1.05fr .95fr;gap:18px;align-items:center}.hero{background:linear-gradient(135deg,#fff,#fff2cf);border:2px solid var(--line);border-radius:24px;padding:22px;min-height:430px;display:flex;flex-direction:column;justify-content:space-between}.hero h2{font-size:clamp(30px,5vw,56px);line-height:1.05;margin:0 0 12px}.hero p{font-size:clamp(16px,2.2vw,22px);line-height:1.6;margin:0;color:#5f472f;font-weight:800}.modeGrid{display:grid;gap:12px;margin-top:18px}.modeBtn{border:0;border-radius:20px;padding:17px 18px;text-align:left;background:#fff;border:3px solid #f0cf91;box-shadow:0 5px 0 #d0a358;cursor:pointer;color:inherit}.modeBtn strong{display:block;font-size:22px}.modeBtn span{display:block;color:#6a533d;font-weight:800;margin-top:4px}.modeBtn.primary{background:linear-gradient(135deg,#ffe08c,#ffb547);border-color:#e2a947}.modeBtn:hover{filter:brightness(1.02)}.modeBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #d0a358}.sideCard{background:#fff;border:2px solid var(--line);border-radius:24px;padding:18px;text-align:center}.sideCard img{width:min(250px,70%);height:auto}.speech{margin:12px auto 0;background:#fff7d4;border:3px solid #f0c15d;border-radius:20px;padding:12px;font-size:20px;font-weight:900;position:relative}.speech:before{content:"";position:absolute;top:-14px;left:48%;border:8px solid transparent;border-bottom-color:#f0c15d}.screen{display:none}.screen.active{display:block}.quizLayout{display:grid;grid-template-columns:1fr 290px;gap:16px}.quizCard{background:#fff;border:2px solid var(--line);border-radius:24px;padding:18px;min-height:430px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.pill{background:#fff1d5;border:2px solid #ebc88d;border-radius:999px;padding:7px 11px;font-weight:900;color:#684923}.question{font-size:clamp(22px,3.2vw,36px);line-height:1.35;font-weight:900;margin:10px 0 14px}.choices{display:grid;gap:10px}.choice{width:100%;border:3px solid #ead0a0;background:#fffaf0;border-radius:18px;padding:14px 14px;text-align:left;font-weight:900;font-size:clamp(16px,2.1vw,21px);cursor:pointer}.choice.correct{background:#e8fff2;border-color:var(--good)}.choice.wrong{background:#fff0f0;border-color:var(--bad)}.choice:disabled{cursor:default}.feedback{margin-top:14px;border-radius:18px;padding:14px;background:#fff6da;border:2px solid #e8c987;font-weight:800;line-height:1.55;display:none}.feedback.show{display:block}.resultTitle{font-size:26px;font-weight:1000;margin:0 0 8px}.rabbitPanel{background:#fff;border:2px solid var(--line);border-radius:24px;padding:14px;text-align:center;min-height:430px;display:flex;flex-direction:column;justify-content:space-between}.rabbitPanel img{width:170px;max-width:95%;margin:auto;object-fit:contain}.rabbitSay{background:#fff3ce;border:3px solid #efc56d;border-radius:18px;padding:11px;font-weight:1000;line-height:1.35}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.bigBtn{border:0;border-radius:16px;padding:13px 18px;font-weight:1000;background:#ffb547;color:#2e2110;box-shadow:0 4px 0 #c98a25;cursor:pointer}.bigBtn.secondary{background:#fff;border:2px solid #e3c28a}.bigBtn:active{transform:translateY(3px);box-shadow:0 1px 0 #c98a25}.final{display:none;text-align:center;background:#fff;border:2px solid var(--line);border-radius:24px;padding:24px}.final img{width:160px}.score{font-size:48px;font-weight:1000;margin:8px 0;color:#c0791a}@media(max-width:820px){.home,.quizLayout{grid-template-columns:1fr}.rabbitPanel{min-height:auto}.sideCard{display:none} header{align-items:flex-start}.brand img{width:48px;height:48px}.topBtns{font-size:14px}.quizCard{min-height:auto}.rabbitPanel img{width:120px}.app{padding:8px} main{padding:10px}.shell{border-radius:20px}}
</style>
</head>
<body>
<div class="app"><div class="shell">
<header>
  <div class="brand"><img src="images/rabbit01.png" onerror="this.style.display='none'" alt="うさぎ"><div><h1>幕末うさぎ歴史クイズ</h1><small>207〜209ページ範囲</small></div></div>
  <div class="topBtns"><a class="miniBtn" href="index2.html">トレーニングモード</a><a class="miniBtn adv" href="index3.html">アドバンストレーニング</a></div>
</header>
<main>
<section id="home" class="screen active">
  <div class="home">
    <div class="hero">
      <div><h2>点で覚える。<br>線でつなげる。</h2><p>まずは通常クイズでテンポよく確認。正解後には、語呂・プチ情報・うさぎ劇で記憶に残します。</p></div>
      <div class="modeGrid">
        <button class="modeBtn primary" onclick="startQuiz()"><strong>通常クイズを始める</strong><span>4択で高速反復。正解後に記憶フックが出ます。</span></button>
        <button class="modeBtn" onclick="location.href='index2.html'"><strong>トレーニングモードへ</strong><span>時系列・場所・地図で、歴史の流れをつかむ。</span></button>
        <button class="modeBtn" onclick="location.href='index3.html'"><strong>アドバンストレーニングへ</strong><span>比較・理由・因果関係を深めるモード。</span></button>
      </div>
    </div>
    <div class="sideCard"><img src="images/rabbit16.png" onerror="this.src='images/rabbit01.png'" alt="うさぎ"><div class="speech">「まずは通常クイズで<br>記憶の土台を作ろう！」</div></div>
  </div>
</section>
<section id="quiz" class="screen">
  <div class="quizLayout">
    <div class="quizCard">
      <div class="meta"><span id="count" class="pill"></span><span id="era" class="pill"></span><span id="place" class="pill"></span></div>
      <div id="question" class="question"></div>
      <div id="choices" class="choices"></div>
      <div id="feedback" class="feedback"></div>
      <div class="actions"><button id="nextBtn" class="bigBtn" onclick="nextQuestion()" style="display:none">次へ</button><button class="bigBtn secondary" onclick="backHome()">ホームへ</button></div>
    </div>
    <div class="rabbitPanel"><div class="rabbitSay" id="rabbitSay">「問題、いくよ！」</div><img id="rabbit" src="images/rabbit01.png" alt="うさぎ"><div class="rabbitSay" id="miniMemo">迷ったら、人物・場所・年号のセットで見る！</div></div>
  </div>
</section>
<section id="final" class="screen"><div class="final"><img src="images/rabbit14.png" onerror="this.src='images/rabbit01.png'" alt="うさぎ"><h2>結果発表</h2><div class="score" id="scoreText"></div><p id="scoreMsg"></p><div class="actions" style="justify-content:center"><button class="bigBtn" onclick="startQuiz()">もう一度</button><button class="bigBtn secondary" onclick="backHome()">ホームへ</button><button class="bigBtn secondary" onclick="location.href='index2.html'">トレーニングへ</button></div></div></section>
</main></div></div>
<script>
const QUESTIONS = [
 {era:'開国の衝撃',year:'1853',place:'浦賀',q:'1853年、アメリカ東インド艦隊司令長官として浦賀に来航した人物は？',a:'ペリー',c:['ハリス','プチャーチン','レザノフ'],goro:'「いやでござんす(1853)、黒船来航」',memo:'幕府が外国への対応を迫られる大きな転機。',scene:'黒船うさぎ「開国してくださーい！」江戸うさぎ「え、急に!?」',rabbit:'rabbit11.png'},
 {era:'開国の衝撃',year:'1854',place:'神奈川・下田・箱館',q:'1854年に結ばれ、下田・箱館を開港した条約は？',a:'日米和親条約',c:['日米修好通商条約','日英和親条約','日露和親条約'],goro:'「いやごよ(1854)、和親で港を開く」',memo:'貿易ではなく、補給・寄港を認めた段階。',scene:'幕府うさぎ「とりあえず港だけ…」',rabbit:'rabbit06.png'},
 {era:'開国の衝撃',year:'1854',place:'下田・箱館',q:'日米和親条約で開かれた2港の組み合わせは？',a:'下田・箱館',c:['横浜・長崎','神奈川・兵庫','新潟・長崎'],goro:'「しもだ・はこだて、まず2港」',memo:'下田は現在の静岡県、箱館は現在の北海道函館。',scene:'うさぎ案内人「まずは下田と箱館から！」',rabbit:'rabbit16.png'},
 {era:'通商条約と不平等',year:'1858',place:'江戸・神奈川',q:'1858年、アメリカ総領事ハリスとの間で結ばれた条約は？',a:'日米修好通商条約',c:['日米和親条約','日露和親条約','安政の五カ国条約'],goro:'「いやごや(1858)で通商スタート」',memo:'貿易開始。不平等条約として領事裁判権などが問題に。',scene:'ハリスうさぎ「貿易、始めましょう」幕府うさぎ「条件きつい…」',rabbit:'rabbit08.png'},
 {era:'通商条約と不平等',year:'1858',place:'下田・横浜など',q:'日米修好通商条約の内容として正しいものは？',a:'貿易開始と領事裁判権を認めた',c:['鎖国を完成させた','将軍が朝廷を廃止した','参勤交代を強化した'],goro:'「通商＝貿易、不平等もセット」',memo:'関税自主権が弱く、領事裁判権を認めた点が重要。',scene:'うさぎ商人「貿易だ！」幕府うさぎ「でも条件が不利…」',rabbit:'rabbit13.png'},
 {era:'幕府への反発',year:'1858-1859',place:'江戸・京都など',q:'井伊直弼が反対派を処罰した弾圧事件は？',a:'安政の大獄',c:['桜田門外の変','大政奉還','禁門の変'],goro:'「安政＝安心じゃない、大弾圧」',memo:'通商条約や将軍継嗣問題への反対派が処罰された。',scene:'井伊うさぎ「反対派は処分！」周り「ひぇ…」',rabbit:'rabbit10.png'},
 {era:'幕府への反発',year:'1860',place:'江戸城桜田門',q:'1860年、井伊直弼が水戸浪士らに暗殺された事件は？',a:'桜田門外の変',c:['安政の大獄','生麦事件','坂下門外の変'],goro:'「人群れ(1860)の中、桜田門で大事件」',memo:'安政の大獄への反発が爆発した事件。',scene:'雪の日、井伊うさぎ「え!?」水戸うさぎ「許さん！」',rabbit:'rabbit05.png'},
 {era:'公武合体と尊攘',year:'1862',place:'京都・江戸',q:'朝廷と幕府を結びつけて政治を安定させようとした政策は？',a:'公武合体',c:['尊王攘夷','大政奉還','版籍奉還'],goro:'「公＝朝廷、武＝幕府。くっつける」',memo:'和宮の降嫁などが代表例。',scene:'朝廷うさぎと幕府うさぎ「とりあえず手を組もう」',rabbit:'rabbit04.png'},
 {era:'尊王攘夷の高まり',year:'1862',place:'生麦（神奈川）',q:'イギリス人が薩摩藩士に殺傷され、薩英戦争の原因となった事件は？',a:'生麦事件',c:['桜田門外の変','禁門の変','蛤御門の変'],goro:'「生麦で、薩英戦争の火種」',memo:'外国人殺傷事件が国際問題化した。',scene:'生麦うさぎ「道中で大事件！」',rabbit:'rabbit12.png'},
 {era:'尊王攘夷の高まり',year:'1863',place:'鹿児島湾',q:'生麦事件をきっかけに起こった、薩摩藩とイギリスの戦争は？',a:'薩英戦争',c:['下関戦争','戊辰戦争','西南戦争'],goro:'「人群み(1863)て薩英戦争」',memo:'薩摩は西洋の軍事力を知り、考えを変えていく。',scene:'薩摩うさぎ「攘夷！」→「イギリス強すぎ…学ぼう」',rabbit:'rabbit07.png'},
 {era:'尊王攘夷の高まり',year:'1863-1864',place:'下関',q:'長州藩が外国船を砲撃したことをきっかけに起こった戦争は？',a:'下関戦争',c:['薩英戦争','鳥羽・伏見の戦い','箱館戦争'],goro:'「下関で外国船にドーン」',memo:'長州も西洋の力を痛感し、攘夷一本から変化していく。',scene:'長州うさぎ「撃てー！」外国船「反撃！」',rabbit:'rabbit15.png'},
 {era:'幕府改革',year:'1866',place:'全国',q:'江戸幕府が行った最後の大きな改革は？',a:'慶応の改革',c:['享保の改革','寛政の改革','天保の改革'],goro:'「最後の改革は慶応」',memo:'幕府は軍制改革などで立て直しを図った。',scene:'幕府うさぎ「まだ立て直せる…はず！」',rabbit:'rabbit03.png'}
];
let order=[],idx=0,score=0,answered=false;
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function startQuiz(){order=shuffle(QUESTIONS.map((_,i)=>i));idx=0;score=0;show('quiz');loadQ()}
function backHome(){show('home')}
function loadQ(){answered=false;const d=QUESTIONS[order[idx]];document.getElementById('count').textContent=`${idx+1} / ${order.length}`;document.getElementById('era').textContent=d.era;document.getElementById('place').textContent=`場所：${d.place}`;document.getElementById('question').textContent=d.q;document.getElementById('rabbit').src='images/rabbit01.png';document.getElementById('rabbitSay').textContent='「選択肢をよく見て！」';document.getElementById('miniMemo').textContent=`${d.year}年ごろ｜${d.place}`;document.getElementById('feedback').className='feedback';document.getElementById('feedback').innerHTML='';document.getElementById('nextBtn').style.display='none';const choices=shuffle([d.a,...d.c]);const box=document.getElementById('choices');box.innerHTML='';choices.forEach(x=>{const b=document.createElement('button');b.className='choice';b.textContent=x;b.onclick=()=>answer(b,x,d);box.appendChild(b)})}
function answer(btn,x,d){if(answered)return;answered=true;document.querySelectorAll('.choice').forEach(b=>{b.disabled=true;if(b.textContent===d.a)b.classList.add('correct')});const ok=x===d.a;if(!ok)btn.classList.add('wrong');if(ok)score++;document.getElementById('rabbit').src='images/'+(ok?d.rabbit:'rabbit09.png');document.getElementById('rabbitSay').textContent=ok?'「正解！記憶フックをつけよう！」':'「惜しい！ここで覚え直そう」';document.getElementById('miniMemo').textContent=d.scene;const f=document.getElementById('feedback');f.className='feedback show';f.innerHTML=`<div class="resultTitle" style="color:${ok?'#2e9d68':'#d94a4a'}">${ok?'正解！':'不正解'}</div><b>答え：${d.a}</b><br>🌟 ${d.goro}<br>🐰 ${d.scene}<br>📌 ${d.memo}`;document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').textContent=idx===order.length-1?'結果を見る':'次へ'}
function nextQuestion(){idx++; if(idx>=order.length){finish()}else{loadQ()}}
function finish(){show('final');document.getElementById('scoreText').textContent=`${score} / ${order.length}`;document.getElementById('scoreMsg').textContent=score===order.length?'完璧！次はトレーニングモードで流れを確認しよう。':'間違えた問題は、語呂とうさぎ劇で覚え直そう。'}
</script>
</body>
</html>
