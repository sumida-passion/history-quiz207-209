<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>日本史クイズ｜幕末トレーニング</title>
<style>
:root{--bg:#f7f0e8;--card:#fffdf9;--ink:#2b2723;--accent:#b71c1c;--accent2:#1d3557;--ok:#16845b;--ng:#c62828;--soft:#ead8c8;--gold:#f4a261;--muted:#8a7a6b;}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:linear-gradient(135deg,#fff7ed,#f5efe7 55%,#ead9cb);}
.app{max-width:1080px;margin:0 auto;padding:10px 10px 18px;}
header{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:10px;}
.title{font-size:clamp(22px,3.8vw,38px);font-weight:950;letter-spacing:.02em;line-height:1.15}
.badge{background:var(--accent);color:#fff;border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px;white-space:nowrap}
.panel{background:rgba(255,253,249,.94);border:2px solid var(--soft);box-shadow:0 10px 22px rgba(80,50,25,.12);border-radius:22px;padding:12px;}
.lead{font-size:16px;line-height:1.75}
.menu{display:grid;gap:14px}
.btns{display:flex;flex-wrap:wrap;gap:10px}
.btn{border:0;border-radius:16px;padding:13px 17px;font-size:16px;font-weight:900;background:var(--accent2);color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.18);cursor:pointer;touch-action:manipulation;}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.18)}
.btn.red{background:var(--accent)}.btn.sub{background:#665244}.btn.train{background:#0f766e}.btn.ghost{background:#fff;color:var(--accent2);border:2px solid var(--accent2)}
.small{font-size:13px;color:#685d54;line-height:1.55}
.game{display:none}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:10px;align-items:start}
.layout.normal{grid-template-columns:minmax(0,1fr)}
.side{display:none;position:sticky;top:8px;align-self:start;max-height:calc(100vh - 16px);overflow:auto}
.training .side{display:block}
.topbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap}
.meter{font-weight:900;background:#fff;border:2px solid var(--soft);padding:8px 12px;border-radius:999px}
.progress{height:12px;background:#ead8c8;border-radius:999px;overflow:hidden;flex:1;min-width:160px}.bar{height:100%;width:0;background:linear-gradient(90deg,#b71c1c,#f08c00);transition:.25s}
.qbox{padding:16px;border-radius:20px;background:#fff;border:2px solid var(--soft);}
.section{display:inline-block;background:#f3e2d4;color:#6b3b20;border-radius:999px;padding:6px 10px;font-weight:900;font-size:13px;margin-bottom:10px}
.question{font-size:clamp(20px,3.3vw,30px);font-weight:950;line-height:1.42;margin:4px 0 14px}
.choices{display:grid;gap:10px}
.choice{width:100%;text-align:left;border:2px solid #d9c4b3;background:#fffaf4;border-radius:18px;padding:13px 14px;font-size:17px;font-weight:850;line-height:1.45;cursor:pointer;touch-action:manipulation;}
.choice:active{transform:scale(.99)}.choice.correct{background:#e8f7ef;border-color:var(--ok);color:#075c3a}.choice.wrong{background:#fdecec;border-color:var(--ng);color:#8c1515}
.reaction{display:grid;grid-template-columns:110px 1fr;gap:12px;align-items:center;margin-top:12px;padding:12px;border-radius:20px;background:#fff7ec;border:2px dashed #e6bf92;min-height:120px}
.rabbitWrap{width:110px;height:110px;border-radius:22px;background:#fff;display:grid;place-items:center;overflow:hidden;border:2px solid #f1d7b8}
.rabbitWrap img{max-width:105px;max-height:105px;object-fit:contain;filter:drop-shadow(0 4px 4px rgba(0,0,0,.12))}
.bubble{font-size:16px;line-height:1.55}.feedback{font-size:21px;font-weight:950;margin-bottom:4px}.ok{color:var(--ok)}.ng{color:var(--ng)}
.memory{display:none;margin-top:10px;padding:12px;border-radius:16px;background:#fff;border:2px solid #f0d0a8;line-height:1.6}
.memory b{color:#8a2d16}
.nextrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.result{display:none}
.mistakes{display:grid;gap:8px;margin-top:10px}.mistake{background:#fff;border:1px solid #e2cdb9;border-radius:14px;padding:10px}
.sideCard{background:rgba(255,253,249,.96);border:2px solid var(--soft);border-radius:18px;padding:9px;box-shadow:0 6px 14px rgba(80,50,25,.08);margin-bottom:8px}
.sideTitle{font-weight:950;color:#6b3b20;margin-bottom:8px;font-size:15px}
.hintGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.hintBox{background:#fff7ec;border:1px solid #efd0ae;border-radius:14px;padding:9px}
.hintLabel{font-size:11px;color:#806b5a;font-weight:900}.hintValue{font-size:16px;font-weight:950;margin-top:2px}
.chapter{font-weight:950;background:#f2e0d2;border-radius:12px;padding:6px 8px;margin:6px 0;color:#5b351d;font-size:13px}
.timeline{display:grid;gap:6px}
.titem{display:grid;grid-template-columns:42px 1fr;gap:6px;align-items:center;padding:5px 6px;border-radius:12px;background:#f8f0e8;border:1px solid #ead8c8;opacity:.58;transition:.25s}
.titem.current{opacity:1;border-color:#b71c1c;box-shadow:0 0 0 2px rgba(183,28,28,.08);transform:translateX(2px)}
.titem.done{opacity:1;background:#fff;border-color:#ebb46c}
.year{font-weight:950;color:#8a2d16;font-size:13px}.tmain{font-size:12px;font-weight:850;line-height:1.25}.placeMini{font-size:11px;color:#6b5d50;margin-top:2px}
.unlock{font-size:12px;line-height:1.5;background:#fff8e8;border:1px solid #f0d4a0;padding:8px;border-radius:12px;margin-top:8px}
@media(max-width:880px){.layout{grid-template-columns:1fr}.side{position:relative;max-height:none;order:-1}.training .side{display:block}.reaction{grid-template-columns:88px 1fr}.rabbitWrap{width:88px;height:88px}.rabbitWrap img{max-width:84px;max-height:84px}}
@media(max-height:760px) and (orientation:landscape){.app{padding:6px;max-width:1060px}header{margin-bottom:4px}.title{font-size:22px}.badge{font-size:11px;padding:6px 9px}.panel{padding:8px;border-radius:18px}.layout{grid-template-columns:minmax(0,1fr) 280px;gap:8px}.topbar{margin-bottom:6px}.meter{padding:5px 8px;font-size:13px}.qbox{padding:10px;border-radius:16px}.section{font-size:11px;padding:4px 8px;margin-bottom:6px}.question{font-size:20px;line-height:1.34;margin-bottom:8px}.choices{gap:7px}.choice{padding:8px 10px;font-size:14px;border-radius:14px}.reaction{min-height:78px;padding:7px;grid-template-columns:70px 1fr;margin-top:8px}.rabbitWrap{width:70px;height:70px;border-radius:16px}.rabbitWrap img{max-width:68px;max-height:68px}.feedback{font-size:17px}.bubble{font-size:13px}.memory{padding:8px;font-size:13px;margin-top:7px}.nextrow{margin-top:7px}.btn{padding:9px 12px;font-size:14px}.side{max-height:calc(100vh - 12px)}.sideCard{padding:7px;margin-bottom:6px;border-radius:16px}.sideTitle{font-size:13px;margin-bottom:5px}.hintBox{padding:6px}.hintValue{font-size:13px}.unlock{font-size:11px;padding:6px}.timeline{gap:4px}.titem{padding:4px 5px;grid-template-columns:38px 1fr}.year{font-size:11px}.tmain{font-size:11px}.placeMini{display:none}}
</style>
</head>
<body>
<div class="app">
<header><div class="title">日本史クイズ<br><span style="font-size:.65em">幕末トレーニング</span></div><div class="badge">うさぎ歴史劇つき</div></header>
<section id="menu" class="panel menu">
  <div class="lead">4択でテンポよく確認する<strong>通常モード</strong>と、時系列バー・場所ヒントを見ながら流れをつかむ<strong>トレーニングモード</strong>を選べます。</div>
  <div class="btns">
    <button class="btn" onclick="startGame(10,'normal')">通常 10問</button>
    <button class="btn red" onclick="startGame(DATA.length,'normal')">通常 全問</button>
    <button class="btn train" onclick="startGame(10,'training')">トレーニング 10問</button>
    <button class="btn train" onclick="startGame(DATA.length,'training')">トレーニング 全問</button>
  </div>
  <div class="small">GitHub Pages用：<code>index.html</code> と <code>images</code> フォルダを同じ階層に置けば動きます。</div>
</section>
<section id="game" class="game">
 <div id="layout" class="layout normal">
  <main class="panel">
   <div class="topbar"><div class="meter" id="modeLabel">通常モード</div><div class="meter" id="count">1 / 10</div><div class="progress"><div class="bar" id="bar"></div></div><div class="meter" id="score">正解 0</div></div>
   <div class="qbox"><div class="section" id="section"></div><div class="question" id="question"></div><div class="choices" id="choices"></div></div>
   <div class="reaction"><div class="rabbitWrap"><img id="rabbit" src="images/rabbit01.png" alt="うさぎ" onerror="this.style.display='none';this.parentElement.textContent='🐰';"></div><div class="bubble"><div id="feedback" class="feedback">選択肢をえらんでね</div><div id="rabbitLine">歴史の流れを見ながら進めよう。</div></div></div>
   <div id="memory" class="memory"></div>
   <div class="nextrow"><button class="btn" id="nextBtn" onclick="nextQ()" disabled>次へ</button><button class="btn sub" onclick="backMenu()">メニュー</button></div>
  </main>
  <aside id="side" class="side">
    <div class="sideCard"><div class="sideTitle">今のヒント</div><div class="hintGrid"><div class="hintBox"><div class="hintLabel">時期</div><div id="hintYear" class="hintValue">—</div></div><div class="hintBox"><div class="hintLabel">場所</div><div id="hintPlace" class="hintValue">—</div></div></div><div id="unlock" class="unlock">正解すると、この時代ブロックが少しずつ埋まります。</div></div>
    <div class="sideCard"><div class="sideTitle">時系列バー</div><div id="timeline"></div></div>
  </aside>
 </div>
</section>
<section id="result" class="panel result"><h2>結果</h2><div class="question" id="finalScore"></div><p id="finalMsg" class="lead"></p><div class="btns"><button class="btn" onclick="startGame(lastN,currentMode)">もう一回</button><button class="btn train" onclick="startGame(lastN,'training')">トレーニングで復習</button><button class="btn sub" onclick="backMenu()">メニュー</button><button class="btn ghost" id="reviewBtn" onclick="reviewMistakes()">間違いだけ</button></div><div id="mistakes" class="mistakes"></div></section>
</div>
<script>
const DATA = [
{s:'ペリー来航と対外方針の模索',q:'幕府が異国船打払令を緩和して出した法令を何というか。',a:'天保の薪水給与令',o:['天保の薪水給与令','異国船打払令','五品江戸廻送令','万延小判']},
{s:'ペリー来航と対外方針の模索',q:'天保の薪水給与令は西暦何年に発令されたか。',a:'1842年',o:['1842年','1853年','1854年','1858年']},
{s:'ペリー来航と対外方針の模索',q:'天保の薪水給与令の発令の要因となった、中国での戦争を何というか。',a:'アヘン戦争',o:['アヘン戦争','第2次アヘン戦争','アロー戦争','クリミア戦争']},
{s:'ペリー来航と対外方針の模索',q:'アヘン戦争で敗れた清とイギリスが結んだ条約を何というか。',a:'南京条約',o:['南京条約','天津条約','北京条約','日米和親条約']},
{s:'ペリー来航と対外方針の模索',q:'1844年、国王が12代将軍徳川家慶に親書をもたらし、開国を勧めた国はどこか。',a:'オランダ',o:['オランダ','ロシア','アメリカ','イギリス']},
{s:'ペリー来航と対外方針の模索',q:'1845年、幕府が対外政策について検討するために設置した役職を何というか。',a:'海防掛',o:['海防掛','総領事','老中首座','外国奉行']},
{s:'ペリー来航と対外方針の模索',q:'1846年に浦賀に来航し、開国を求めたアメリカ東インド艦隊司令長官は誰か。',a:'ビッドル',o:['ビッドル','ペリー','ハリス','プチャーチン']},
{s:'ペリー来航と対外方針の模索',q:'日本を開国させた、アメリカ東インド艦隊司令長官は誰か。',a:'ペリー',o:['ペリー','ビッドル','ハリス','プチャーチン']},
{s:'ペリー来航と対外方針の模索',q:'ペリーが軍艦4隻を率いて日本に来航したのは西暦何年か。',a:'1853年',o:['1853年','1854年','1856年','1858年']},
{s:'ペリー来航と対外方針の模索',q:'ペリーは1853年6月に日本のどこに来航したか。',a:'浦賀',o:['浦賀','下田','長崎','横浜']},
{s:'ペリー来航と対外方針の模索',q:'ペリーがアメリカ大統領の国書を幕府に受理させたが、この時の大統領名をあげよ。',a:'フィルモア',o:['フィルモア','リンカン','ヒュースケン','ハリス']},
{s:'ペリー来航と対外方針の模索',q:'ペリーが来航した時の、幕府の老中首座は誰か。',a:'阿部正弘',o:['阿部正弘','堀田正睦','井伊直弼','徳川斉昭']},
{s:'ペリー来航と対外方針の模索',q:'ペリーに続いて来日し、開国を要求したロシアの使節は誰か。',a:'プチャーチン',o:['プチャーチン','ペリー','ハリス','ビッドル']},
{s:'ペリー来航と対外方針の模索',q:'1853年にプチャーチンはどこに来航したか。',a:'長崎',o:['長崎','浦賀','下田','横浜']},
{s:'ペリー来航と対外方針の模索',q:'1854年にペリーが再来日し、江戸幕府と締結した条約を何というか。',a:'日米和親条約（神奈川条約）',o:['日米和親条約（神奈川条約）','日米修好通商条約','日露和親条約','安政の五カ国条約']},
{s:'ペリー来航と対外方針の模索',q:'日米和親条約が締結されたのは西暦何年か。',a:'1854年',o:['1854年','1853年','1858年','1860年']},
{s:'ペリー来航と対外方針の模索',q:'日米和親条約はどこで締結されたか。当時の宿駅名をあげよ。',a:'神奈川',o:['神奈川','下田','箱館','横浜']},
{s:'ペリー来航と対外方針の模索',q:'日米和親条約で開かれた港を2つあげよ。',a:'下田・箱館',o:['下田・箱館','神奈川・長崎','新潟・兵庫','横浜・長崎']},
{s:'ペリー来航と対外方針の模索',q:'日米和親条約にもとづき、開港地でアメリカ船に供給されたものをあげよ。',a:'燃料・食料',o:['燃料・食料','生糸・茶','毛織物・綿織物','雑穀・蠟']},
{s:'ペリー来航と対外方針の模索',q:'日米和親条約で日本が、より恩恵的な条件を第三国に与えた場合、アメリカにも同様にすることを認めた待遇を何というか。',a:'片務的最恵国待遇',o:['片務的最恵国待遇','領事裁判権','協定関税','関税自主権']},
{s:'ペリー来航と対外方針の模索',q:'日米和親条約締結後、プチャーチンと幕府との間で締結された条約を何というか。',a:'日露和親条約',o:['日露和親条約','日米和親条約','日米修好通商条約','安政の五カ国条約']},
{s:'ペリー来航と対外方針の模索',q:'日露和親条約は西暦何年に締結されたか。',a:'1854年',o:['1854年','1853年','1858年','1863年']},
{s:'ペリー来航と対外方針の模索',q:'日露和親条約で開かれた、下田・箱館以外の港をあげよ。',a:'長崎',o:['長崎','横浜','新潟','兵庫']},
{s:'ペリー来航と対外方針の模索',q:'日露和親条約では国境についても取り決めがなされたが、現在の北方領土でもある日本領のうち、最も北の島は何か。',a:'択捉島',o:['択捉島','国後島','色丹島','歯舞群島']},
{s:'ペリー来航と対外方針の模索',q:'日露和親条約で、従来通り境界を定めないとされたのはどこか。',a:'樺太（サハリン）',o:['樺太（サハリン）','択捉島','下田','神奈川']},
{s:'ペリー来航と対外方針の模索',q:'アメリカ・ロシア以外に和親条約を結んだ国を2つあげよ。',a:'イギリス・オランダ',o:['イギリス・オランダ','フランス・ロシア','清・イギリス','オランダ・ロシア']},
{s:'ペリー来航と対外方針の模索',q:'ペリー来航を機に、幕府が江戸湾防衛のために築いた砲台を何というか。',a:'台場',o:['台場','居留地','海防掛','五稜郭']},
{s:'ペリー来航と対外方針の模索',q:'ペリー来航後、老中阿部正弘を中心に行われた、台場の建設や大船建造の禁の解除など一連の改革を何というか。',a:'安政の改革',o:['安政の改革','天保の改革','享保の改革','寛政の改革']},
{s:'ペリー来航と対外方針の模索',q:'安政の改革で幕政に参画した前水戸藩主は誰か。',a:'徳川斉昭',o:['徳川斉昭','徳川家慶','徳川家定','徳川慶喜']},
{s:'開港とその影響',q:'1856年にイギリス船が広東港で清の官憲に臨検を受けたことを口実に、翌年、イギリス・フランスの軍隊が天津に侵入した事件を何というか。',a:'第2次アヘン戦争（アロー戦争）',o:['第2次アヘン戦争（アロー戦争）','アヘン戦争','東禅寺事件','生麦事件']},
{s:'開港とその影響',q:'第2次アヘン戦争で劣勢になった清が、イギリス・フランス・ロシア・アメリカの4カ国と結んだ条約を何というか。',a:'天津条約',o:['天津条約','南京条約','日米修好通商条約','安政の五カ国条約']},
{s:'開港とその影響',q:'日米和親条約の規定により、アメリカから日本に着任したのは誰か。',a:'ハリス',o:['ハリス','ペリー','ビッドル','ヒュースケン']},
{s:'開港とその影響',q:'江戸時代末期に来日したハリスの役職は何か。',a:'総領事',o:['総領事','東インド艦隊司令長官','老中首座','大老']},
{s:'開港とその影響',q:'ハリスは西暦何年に来日したか。',a:'1856年',o:['1856年','1853年','1854年','1858年']},
{s:'開港とその影響',q:'ハリスが最初に着任したのはどこか。',a:'下田',o:['下田','横浜','長崎','浦賀']},
{s:'開港とその影響',q:'ハリスが着任した当時、老中首座として外交事務にあたっていた人物は誰か。',a:'堀田正睦',o:['堀田正睦','阿部正弘','井伊直弼','徳川斉昭']},
{s:'開港とその影響',q:'第2次アヘン戦争で天津条約が結ばれたことを利用して、ハリスが新たな条約の調印を幕府に迫った。この条約を何というか。',a:'日米修好通商条約',o:['日米修好通商条約','日米和親条約','日露和親条約','天津条約']},
{s:'開港とその影響',q:'日米修好通商条約は西暦何年に締結されたか。',a:'1858年',o:['1858年','1854年','1856年','1860年']},

 else if(has('将軍継嗣問題')){scene='将軍のイスを前に、一橋派うさぎと南紀派うさぎが左右から引っぱる。';info='徳川家定に嗣子がなく、次の将軍をめぐって対立した問題。';}

 else if(has('一橋派')){scene='慶喜推しうさぎチームが「改革で難局を突破！」と旗を振る。';info='徳川慶喜を推した人々を一橋派という。';}
 else {scene='うさぎが時代の流れの上に答えを置いた。点の暗記を、線につなげよう。';info=ev.story;}
 goro = y() || (has('公武合体')?'公＝朝廷、武＝幕府。手を組ませて安定させる。':'「原因 → 出来事 → 結果」を声に出すと、点の暗記が線になる。');
 return {goro,scene,info};
}
function startGame(n,mode){lastN=n;currentMode=mode;quiz=shuffle(DATA).slice(0,n);idx=0;points=0;mistakes=[];revealed=new Set();document.getElementById('menu').style.display='none';document.getElementById('result').style.display='none';document.getElementById('game').style.display='block';const lay=document.getElementById('layout');lay.className='layout '+(mode==='training'?'training':'normal');document.getElementById('modeLabel').textContent=mode==='training'?'トレーニング':'通常モード';showQ();}
function showQ(){locked=false;const item=quiz[idx];const ev=eventOf(item);currentEventKey=ev.key;document.getElementById('count').textContent=`${idx+1} / ${quiz.length}`;document.getElementById('score').textContent=`正解 ${points}`;document.getElementById('bar').style.width=`${(idx/quiz.length)*100}%`;document.getElementById('section').textContent=item.s;document.getElementById('question').textContent=item.q;document.getElementById('feedback').textContent='選択肢をえらんでね';document.getElementById('feedback').className='feedback';document.getElementById('rabbitLine').textContent=currentMode==='training'?'右の時系列と場所をヒントに、今どの場面か見てみよう。':'正解後に、うさぎ歴史劇と記憶フックが出ます。';document.getElementById('memory').style.display='none';document.getElementById('nextBtn').disabled=true;setRabbit(currentMode==='training'?'think':'neutral');const box=document.getElementById('choices');box.innerHTML='';shuffle(item.o).forEach(opt=>{const b=document.createElement('button');b.className='choice';b.textContent=opt;b.onclick=()=>choose(b,opt,item);box.appendChild(b)});updateTrainingPanel(ev,item,false);}
function choose(btn,opt,item){if(locked)return;locked=true;const ev=eventOf(item);const mem=memoryOf(item,ev);const buttons=[...document.querySelectorAll('.choice')];buttons.forEach(b=>{if(b.textContent===item.a)b.classList.add('correct')});let ok=opt===item.a;if(ok){points++;revealed.add(ev.key);document.getElementById('feedback').textContent='正解！';document.getElementById('feedback').classList.add('ok');document.getElementById('rabbitLine').textContent='うさぎ劇で覚える：'+mem.scene;setRabbit(points%5===0?'wow':'correct');beep(880,0.08);setTimeout(()=>beep(1320,0.08),90)}else{btn.classList.add('wrong');mistakes.push(item);document.getElementById('feedback').textContent='惜しい！ 正解は「'+item.a+'」';document.getElementById('feedback').classList.add('ng');document.getElementById('rabbitLine').textContent='ここは「'+ev.year+'・'+ev.place+'」の場面。もう一度、流れで確認。';setRabbit('wrong');beep(220,0.12);setTimeout(()=>beep(165,0.12),100)}
 document.getElementById('memory').innerHTML=`<b>記憶フック</b><br>🐰 ${mem.scene}<br><b>語呂・覚え方</b><br>${mem.goro}<br><b>プチ情報</b><br>${mem.info}`;
 document.getElementById('memory').style.display='block';document.getElementById('score').textContent=`正解 ${points}`;document.getElementById('nextBtn').disabled=false;document.getElementById('bar').style.width=`${((idx+1)/quiz.length)*100}%`;updateTrainingPanel(ev,item,true);}
function updateTrainingPanel(ev,item,answered){document.getElementById('hintYear').textContent=ev.year;document.getElementById('hintPlace').textContent=ev.place;const mem=memoryOf(item,ev);document.getElementById('unlock').innerHTML=answered?`<b>${ev.title}</b><br>${ev.story}`:`今は <b>${ev.title}</b> あたり。場所と時期を見て、答えを予想しよう。`;renderTimeline(ev.key);}
function renderTimeline(currentKey){let html='',last='';TIMELINE.forEach(ev=>{if(ev.chapter!==last){last=ev.chapter;html+=`<div class="chapter">${last}</div>`}const cls=['titem']; if(ev.key===currentKey)cls.push('current'); if(revealed.has(ev.key))cls.push('done');html+=`<div class="${cls.join(' ')}"><div class="year">${ev.year}</div><div><div class="tmain">${revealed.has(ev.key)||ev.key===currentKey?ev.title:'？？？'}</div><div class="placeMini">${ev.place}</div></div></div>`});document.getElementById('timeline').innerHTML=html;}
function nextQ(){idx++; if(idx>=quiz.length)finish(); else showQ();}
function finish(){document.getElementById('game').style.display='none';document.getElementById('result').style.display='block';setRabbit('clear');const pct=Math.round(points/quiz.length*100);document.getElementById('finalScore').textContent=`${points}/${quiz.length}`;document.getElementById('finalMsg').textContent=pct===100?'満点！時代の流れまでかなり見えています。':pct>=80?'かなり仕上がっています。時系列バーで弱い時代だけ復習しよう。':pct>=60?'あと少し。人物・条約・場所を「流れ」でつなげよう。':'まずはトレーニングモードで、時期と場所を見ながら反復しよう。';document.getElementById('reviewBtn').style.display=mistakes.length?'inline-block':'none';const m=document.getElementById('mistakes');m.innerHTML='';mistakes.forEach(x=>{const ev=eventOf(x);const d=document.createElement('div');d.className='mistake';d.innerHTML='<b>'+x.a+'</b><br><span class="small">'+ev.year+'｜'+ev.place+'｜'+x.q+'</span>';m.appendChild(d)})}
function reviewMistakes(){if(!mistakes.length)return;quiz=shuffle(mistakes);lastN=quiz.length;idx=0;points=0;mistakes=[];revealed=new Set();document.getElementById('result').style.display='none';document.getElementById('game').style.display='block';const lay=document.getElementById('layout');lay.className='layout '+(currentMode==='training'?'training':'normal');showQ();}
function backMenu(){document.getElementById('game').style.display='none';document.getElementById('result').style.display='none';document.getElementById('menu').style.display='grid';}
function beep(freq,dur){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.frequency.value=freq;o.type='square';g.gain.setValueAtTime(.055,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur)}catch(e){}}
</script>
