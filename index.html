function showQ(){locked=false;const item=quiz[idx];setRabbit('normal');document.getElementById('count').textContent=`${idx+1} / ${quiz.length}`;document.getElementById('score').textContent=`正解 ${points}`;document.getElementById('bar').style.width=`${(idx/quiz.length)*100}%`;document.getElementById('section').textContent=item.s;document.getElementById('question').textContent=item.q;document.getElementById('feedback').textContent='';document.getElementById('feedback').className='feedback';document.getElementById('answer').style.display='none';document.getElementById('answer').textContent='';document.getElementById('nextBtn').disabled=true;const box=document.getElementById('choices');box.innerHTML='';shuffle(item.o).forEach(opt=>{const b=document.createElement('button');b.className='choice';b.textContent=opt;b.onclick=()=>choose(b,opt,item);box.appendChild(b)})}
function choose(btn,opt,item){if(locked)return;locked=true;const buttons=[...document.querySelectorAll('.choice')];buttons.forEach(b=>{if(b.textContent===item.a)b.classList.add('correct')});if(opt===item.a){points++;streak++;document.getElementById('feedback').textContent=streak>=3?'連続正解！':'正解！';document.getElementById('feedback').classList.add('ok');setRabbit(streak>=3?'great':'ok');beep(880,0.08);setTimeout(()=>beep(1320,0.08),90)}else{streak=0;btn.classList.add('wrong');mistakes.push(item);document.getElementById('feedback').textContent='惜しい！';document.getElementById('feedback').classList.add('ng');document.getElementById('answer').innerHTML='正解：<b>'+item.a+'</b>';document.getElementById('answer').style.display='block';setRabbit('ng');beep(220,0.12);setTimeout(()=>beep(165,0.12),100)}document.getElementById('score').textContent=`正解 ${points}`;document.getElementById('nextBtn').disabled=false;document.getElementById('bar').style.width=`${((idx+1)/quiz.length)*100}%`;}
function nextQ(){idx++; if(idx>=quiz.length){finish()}else{showQ()}}
function finish(){document.getElementById('game').style.display='none';document.getElementById('result').style.display='block';const pct=Math.round(points/quiz.length*100);document.getElementById('finalScore').textContent=`${points}/${quiz.length}`;document.getElementById('finalMsg').textContent=pct===100?'満点！幕末の政治運動マスターです。':pct>=80?'かなり仕上がっています。間違いだけ復習しよう。':pct>=60?'あと少し。人物・事件・年号を整理しよう。':'まずは赤字答えをテンポよく反復しよう。';document.getElementById('resultRabbit').src=pct>=80?RABBITS.clear:(pct>=60?RABBITS.think:RABBITS.ng);document.getElementById('reviewBtn').style.display=mistakes.length?'inline-block':'none';const m=document.getElementById('mistakes');m.innerHTML='';mistakes.forEach(x=>{const d=document.createElement('div');d.className='mistake';d.innerHTML='<b>'+x.a+'</b><br><span class="small">'+x.q+'</span>';m.appendChild(d)})}
function reviewMistakes(){if(!mistakes.length)return;quiz=shuffle(mistakes);idx=0;points=0;mistakes=[];streak=0;document.getElementById('result').style.display='none';document.getElementById('game').style.display='block';showQ()}
function backMenu(){document.getElementById('game').style.display='none';document.getElementById('result').style.display='none';document.getElementById('menu').style.display='grid'}
function beep(freq,dur){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.frequency.value=freq;o.type='square';g.gain.setValueAtTime(.055,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur);o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur)}catch(e){}}
</script></body></html>
