function $(id){return document.getElementById(id)} function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b} function phaseOf(y){return (phases.find(p=>y<=p.max)||phases[4]).name}
function initTimeline(){const track=$('tlTrack'); DATA.forEach((d,i)=>{const x=12+i*(1576/(DATA.length-1)); const dot=document.createElement('div'); dot.className='dot'; dot.id='dot'+i; dot.style.left=x+'px'; dot.textContent=d.seq; track.appendChild(dot); const y=document.createElement('div'); y.className='yearlbl'; y.style.left=x+'px'; y.textContent=(i===0||DATA[i-1].year!==d.year)?d.year:''; track.appendChild(y);});}
function initMap(){const g=$('mapPoints'); DATA.forEach((d,i)=>{const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',d.x); c.setAttribute('cy',d.y); c.setAttribute('r','3.4'); c.setAttribute('fill','#d93a2f'); c.setAttribute('stroke','#fff'); c.setAttribute('stroke-width','1.2'); c.setAttribute('class','pt'); c.setAttribute('id','pt'+i); g.appendChild(c);});}

function updateViz(){DATA.forEach((d,i)=>{$('dot'+i).className='dot'+(solved.has(i)?' done':'')+(i===current?' current':''); $('pt'+i).setAttribute('class','pt'+(solved.has(i)?' on':'')+(i===current?' current':''));}); $('tlProgress').style.width=`calc(${(Math.max(0,current)/(DATA.length-1))*100}% - 12px)`; document.querySelectorAll('.regionFill').forEach(e=>e.classList.remove('on')); const regs=new Set([...solved].map(i=>DATA[i].region)); regs.add(DATA[current].region); regs.forEach(r=>{const el=$('fill-'+r); if(el)el.classList.add('on')}); const dot=$('dot'+current); if(dot)dot.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}
