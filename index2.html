<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>幕末トレーニングモード</title>
<style>
:root{--navy:#17395d;--red:#d33a34;--cream:#fff9ef;--line:#ead7c2;--ink:#1d2733;--green:#198754;--brown:#745943;--gold:#f7b955}
*{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:linear-gradient(180deg,#fffaf0,#f1e4d3);color:var(--ink);overflow-x:hidden}.app{max-width:1240px;margin:0 auto;padding:12px}.top{display:flex;justify-content:space-between;align-items:center;background:#fff;border:2px solid #efe2d4;border-radius:22px;padding:10px 16px;box-shadow:0 6px 16px #0001}.brand{display:flex;gap:12px;align-items:center}.brand img{width:48px;height:48px;object-fit:contain}.brand h1{margin:0;color:var(--navy);font-size:28px}.brand p{margin:2px 0 0;color:#777;font-size:13px}.pill{background:#fff;border:2px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:900;color:var(--navy)}.main{display:grid;grid-template-columns:1.15fr .85fr;gap:12px;margin-top:12px}.panel{background:#fffdf8;border:2px solid #efe2d4;border-radius:22px;padding:14px;box-shadow:0 10px 22px #00000012}.leftTop{display:flex;gap:10px;align-items:center;margin-bottom:10px}.progress{height:15px;flex:1;background:#eadccc;border-radius:999px;overflow:hidden}.fill{height:100%;width:0;background:linear-gradient(90deg,#ff7b00,#d62f2f);transition:.35s}.tag{display:inline-block;background:#f0dfd0;color:#7a4c34;font-weight:900;border-radius:999px;padding:7px 12px;font-size:13px;margin-bottom:10px}.question{border:2px solid var(--line);border-radius:18px;padding:14px;background:#fff}.qtext{font-size:24px;line-height:1.45;font-weight:900;margin:0 0 12px}.choices{display:grid;gap:9px}.choice{border:2px solid #dcc7b2;background:#fffaf4;border-radius:15px;padding:13px 14px;text-align:left;font-size:17px;font-weight:900;color:#174a80}.choice.correct{background:#e8f7ee;border-color:#198754;color:#146c43}.choice.wrong{background:#fdeaea;border-color:#d33a34;color:#9d201a}.memory{display:none;margin-top:10px;border:2px solid #f0c58d;border-radius:16px;background:#fffaf2;padding:12px}.memory b{color:#8b1d18}.navBtns{display:flex;gap:9px;margin-top:10px}.btn{border:none;border-radius:14px;padding:12px 18px;font-weight:900;font-size:16px;background:#17395d;color:#fff}.btn2{background:#745943}.side{display:grid;gap:10px}.hint{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hintBox{border:2px solid #f0d0a8;border-radius:14px;padding:10px;background:#fffaf2}.hintBox small{display:block;color:#8b5b30;font-weight:900}.hintBox b{font-size:18px}.timeline{max-height:320px;overflow:auto}.phaseTitle{background:#ead7c2;border-radius:12px;padding:8px 10px;margin:8px 0;font-weight:900;color:#744c35}.event{display:grid;grid-template-columns:48px 1fr;gap:8px;align-items:center;border:2px solid #eee0d1;border-radius:12px;padding:8px;margin:6px 0;background:#fffaf5;opacity:.45;position:relative}.event.done{opacity:1;border-color:#f0a45c;background:#fff5e8}.event.current{opacity:1;border-color:#d33a34;box-shadow:0 0 0 3px #d33a3422}.year{font-weight:900;color:#b65a45}.ename{font-weight:900;font-size:13px}.place{font-size:12px;color:#777}.mapWrap{border:2px solid var(--line);border-radius:18px;background:#fbf7ef;padding:10px}.mapTitle{font-weight:900;color:#8b1d18;margin-bottom:6px}.map svg{width:100%;height:210px}.region{fill:#f4eadc;stroke:#d4bfa7;stroke-width:2;transition:.3s}.region.active{fill:#f7b955}.region.hot{fill:#e95d4e}.spot{fill:#fff;stroke:#777;stroke-width:2}.spot.on{fill:#d33a34;stroke:#8b1d18}.spotText{font-size:11px;font-weight:900;fill:#493525}.theater{border:2px solid var(--line);border-radius:18px;background:#fffaf2;padding:10px;min-height:160px;display:grid;grid-template-columns:105px 1fr;gap:10px;align-items:center}.theater img{width:100px;height:100px;object-fit:contain;background:white;border:2px solid #ead7c2;border-radius:18px}.speech{background:#fff;border:3px solid #333;border-radius:18px;padding:12px;font-weight:900;line-height:1.45;position:relative}.speech:before{content:"";position:absolute;left:-16px;top:38px;border-width:10px 16px 10px 0;border-style:solid;border-color:transparent #333 transparent transparent}.opening{text-align:center}.opening h2{font-size:38px;color:#8b1d18;margin:12px 0}.opening p{line-height:1.8;color:#555}.startbtn{font-size:20px;background:linear-gradient(90deg,#d92828,#e95349);width:100%;margin-top:12px}.backlink{display:block;text-align:center;margin-top:10px;color:#17395d;font-weight:900;text-decoration:none}@media(max-width:900px){.main{grid-template-columns:1fr}.brand h1{font-size:23px}.qtext{font-size:21px}.map svg{height:180px}.timeline{max-height:260px}.theater{grid-template-columns:90px 1fr}.theater img{width:84px;height:84px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="brand"><img src="images/rabbit01.png" alt="うさぎ"><div><h1>幕末トレーニングモード</h1><p>時系列順に進み、場所と出来事が地図と線でつながります</p></div></div><div class="pill" id="scorePill">0/0</div></header>
<section id="opening" class="panel opening"><h2>点を、線にする。</h2><p>このモードはランダムではなく、歴史の流れ順に出題されます。正解すると、時系列の点が埋まり、日本地図の発生場所に色がつきます。幕末の圧力がどこから高まっていくかを見ながら進めます。</p><button class="btn startbtn" onclick="start()">トレーニング開始</button><a class="backlink" href="index.html">通常クイズへ戻る</a></section>
<section id="game" class="main" style="display:none">
<div class="panel"><div class="leftTop"><div class="pill">時系列トレーニング</div><div class="pill" id="count">1/10</div><div class="progress"><div class="fill" id="fill"></div></div></div><div class="question"><div class="tag" id="phase"></div><p class="qtext" id="qtext"></p><div class="choices" id="choices"></div></div><div class="memory" id="memory"><b>記憶フック</b><div id="hook"></div><b>プチ解説</b><div id="explain"></div></div><div class="navBtns"><button class="btn" onclick="next()" id="nextBtn" disabled>次へ</button><button class="btn btn2" onclick="location.href='index.html'">通常クイズへ</button></div></div>
<aside class="side"><div class="panel"><div class="hint"><div class="hintBox"><small>時間</small><b id="hintYear">—</b></div><div class="hintBox"><small>場所</small><b id="hintPlace">—</b></div></div></div><div class="panel timeline" id="timeline"></div><div class="panel mapWrap"><div class="mapTitle">出来事が起こった場所</div><div class="map"><svg viewBox="0 0 360 240" role="img" aria-label="日本模式地図"><path id="hokkaido" class="region" d="M250 25 C300 5 342 30 330 68 C303 82 270 80 246 62 C234 50 232 35 250 25Z"/><path id="tohoku" class="region" d="M230 78 C270 70 300 95 292 132 C276 155 240 150 224 126 C214 108 215 88 230 78Z"/><path id="kanto" class="region" d="M210 136 C240 128 265 142 260 168 C244 188 210 180 199 160 C194 150 198 140 210 136Z"/><path id="chubu" class="region" d="M150 132 C188 120 215 136 210 160 C196 185 150 180 130 158 C125 146 134 136 150 132Z"/><path id="kinki" class="region" d="M106 154 C132 142 158 150 160 172 C150 194 112 195 96 178 C88 166 94 158 106 154Z"/><path id="chugoku" class="region" d="M55 156 C90 146 112 158 106 176 C94 192 56 188 42 176 C35 166 43 160 55 156Z"/><path id="shikoku" class="region" d="M78 192 C105 184 128 190 124 205 C106 216 78 213 62 202 C59 196 66 193 78 192Z"/><path id="kyushu" class="region" d="M36 188 C60 180 76 197 70 218 C55 238 25 228 20 207 C17 196 24 191 36 188Z"/><circle id="edo" class="spot" cx="227" cy="157" r="5"/><text class="spotText" x="235" y="160">江戸</text><circle id="uraga" class="spot" cx="229" cy="169" r="5"/><text class="spotText" x="236" y="176">浦賀</text><circle id="kanagawa" class="spot" cx="218" cy="170" r="5"/><text class="spotText" x="225" y="190">神奈川</text><circle id="kyoto" class="spot" cx="124" cy="166" r="5"/><text class="spotText" x="130" y="165">京都</text><circle id="osaka" class="spot" cx="119" cy="178" r="5"/><text class="spotText" x="127" y="182">大坂</text><circle id="satsuma" class="spot" cx="43" cy="216" r="5"/><text class="spotText" x="52" y="222">薩摩</text><circle id="mito" class="spot" cx="234" cy="145" r="5"/><text class="spotText" x="244" y="145">水戸</text><circle id="echizen" class="spot" cx="154" cy="145" r="5"/><text class="spotText" x="160" y="144">越前</text></svg></div></div><div class="theater"><img id="rab" src="images/rabbit11.png" alt="うさぎ"><div class="speech" id="speech">ここに、うさぎ劇が出ます。</div></div></aside>
</section>
</div>
<script>
const DATA=[
{year:'1853',phase:'黒船ショック',place:'江戸・浦賀',regions:['kanto'],spots:['edo','uraga'],q:'1853年のペリー来航直後に13代将軍になったのはだれか。',a:'徳川家定',c:['徳川家慶','徳川家茂','徳川慶喜'],hook:'黒船ショックの直後に、将軍は家慶から家定へ。',ex:'徳川家定が病弱だったことが、次の将軍をめぐる政治問題につながる。',rabbit:'images/rabbit11.png',speech:'黒船が来た直後、幕府のトップも不安定に…「次の将軍、大丈夫？」'},
{year:'1857',phase:'将軍継嗣問題',place:'江戸',regions:['kanto'],spots:['edo'],q:'徳川家定が病弱で嗣子もなかったため、公然化した次期将軍の問題を何というか。',a:'将軍継嗣問題',c:['公武合体論','安政の大獄','文久の改革'],hook:'将軍の「継ぎ」を「嗣ぐ」問題＝将軍継嗣問題。',ex:'一橋派と南紀派の対立が、幕府内部の政治対立を大きくした。',rabbit:'images/rabbit05.png',speech:'「次の将軍、誰にする？」この相談が、ただの人事じゃなく大事件に。'},
{year:'1858',phase:'一橋派と南紀派',place:'江戸・越前・薩摩',regions:['kanto','chubu','kyushu'],spots:['edo','echizen','satsuma'],q:'14代将軍に徳川慶喜を推した人たちは何派と呼ばれたか。',a:'一橋派',c:['南紀派','尊王攘夷派','佐幕派'],hook:'慶喜＝一橋家。だから一橋派。',ex:'一橋派は改革派大名らに支持されたが、南紀派と対立した。',rabbit:'images/rabbit13.png',speech:'「賢い慶喜で立て直すぞ！」改革したいうさぎたちが集まる。'},
{year:'1858',phase:'南紀派と大老',place:'彦根・江戸',regions:['kanto','chubu'],spots:['edo'],q:'南紀派の中心となっていた彦根藩主はだれか。',a:'井伊直弼',c:['徳川斉昭','松平慶永','島津斉彬'],hook:'井伊直弼＝彦根藩。南紀派の中心。',ex:'井伊直弼は大老として幕府政治の主導権を握る。',rabbit:'images/rabbit03.png',speech:'「幕府の秩序は私が守る！」井伊直弼うさぎ、強めに登場。'},
{year:'1858',phase:'安政の大獄',place:'江戸・水戸・越前',regions:['kanto','chubu'],spots:['edo','mito','echizen'],q:'井伊直弼が批判勢力に対して徹底的に弾圧を加え、処罰したことを何と呼ぶか。',a:'安政の大獄',c:['桜田門外の変','坂下門外の変','文久の改革'],hook:'安政年間の大きな弾圧＝安政の大獄。',ex:'一橋派や尊王攘夷派が処罰され、反発が一気に強まった。',rabbit:'images/rabbit14.png',speech:'「反対する者は処罰！」強い弾圧で、怒りゲージが上がる。'},
{year:'1860',phase:'桜田門外の変',place:'江戸・桜田門',regions:['kanto'],spots:['edo','mito'],q:'安政の大獄に反発した志士たちが、大老井伊直弼を暗殺した事件を何というか。',a:'桜田門外の変',c:['坂下門外の変','生麦事件','寺田屋事件'],hook:'人群れ（1860）の中で、雪の桜田門外。',ex:'大老が江戸城近くで殺害され、幕府の権威が大きく揺らいだ。',rabbit:'images/rabbit09.png',speech:'雪の日の江戸。「許さん！」怒りがついに爆発する。'},
{year:'1861',phase:'公武合体',place:'江戸・京都',regions:['kanto','kinki'],spots:['edo','kyoto'],q:'幕府が朝廷の権威と結びついて幕政を維持しようとした考え方を何というか。',a:'公武合体論',c:['尊王攘夷論','倒幕論','富国強兵'],hook:'公＝朝廷、武＝幕府。合体して安定したい。',ex:'井伊直弼後の幕府は、朝廷との連携で正統性を回復しようとした。',rabbit:'images/rabbit15.png',speech:'「朝廷と手を組めば、まだ立て直せるかも…」幕府うさぎ、必死。'},
{year:'1862',phase:'坂下門外の変',place:'江戸・坂下門',regions:['kanto'],spots:['edo'],q:'和宮降嫁に反発した尊攘派により、老中安藤信正が傷つけられた事件を何というか。',a:'坂下門外の変',c:['桜田門外の変','寺田屋事件','生麦事件'],hook:'桜田門外の次は坂下門外。門外事件が続く。',ex:'公武合体政策にも反発が起こり、幕府の混乱は続いた。',rabbit:'images/rabbit04.png',speech:'「また門外!?」公武合体にも反発。江戸の緊張が続く。'},
{year:'1862',phase:'薩摩の動き',place:'京都・寺田屋',regions:['kinki','kyushu'],spots:['kyoto','satsuma'],q:'島津久光が倒幕挙兵を計画していた薩摩藩士を斬り殺した事件を何というか。',a:'寺田屋事件',c:['生麦事件','薩英戦争','坂下門外の変'],hook:'薩摩内部の暴発を寺田屋で止めた。',ex:'薩摩藩内でも急進派と現実路線の対立があった。',rabbit:'images/rabbit10.png',speech:'「勝手に暴発するな！」薩摩の中でも意見が割れていた。'},
{year:'1862',phase:'文久の改革',place:'江戸・京都',regions:['kanto','kinki'],spots:['edo','kyoto'],q:'島津久光らの要求を受けて幕府が行った改革を何というか。',a:'文久の改革',c:['安政の改革','享保の改革','天保の改革'],hook:'文久年間の幕政改革＝文久の改革。',ex:'将軍後見職・政事総裁職・京都守護職などが整えられた。',rabbit:'images/rabbit16.png',speech:'「体制を立て直せ！」幕府、制度を組み替えて耐えようとする。'},
{year:'1862',phase:'京都守護職',place:'京都',regions:['kinki'],spots:['kyoto'],q:'文久の改革で、京都の治安を維持するために設けられた職を何というか。',a:'京都守護職',c:['将軍後見職','政事総裁職','大老'],hook:'京都を守る職＝京都守護職。',ex:'尊攘派が集まる京都を押さえるため、会津藩の松平容保が任命された。',rabbit:'images/rabbit12.png',speech:'「京都が熱すぎる！」治安維持のために守護職を置く。'},
{year:'1863',phase:'薩英戦争',place:'薩摩・鹿児島湾',regions:['kyushu'],spots:['satsuma'],q:'生麦事件が原因となっておこった戦いを何というか。',a:'薩英戦争',c:['下関戦争','アロー戦争','戊辰戦争'],hook:'薩摩とイギリスが戦う＝薩英戦争。1863年。',ex:'薩摩藩はイギリスの軍事力を知り、のちに接近していく。',rabbit:'images/rabbit07.png',speech:'「強い…！」戦ってみて、世界の力を知る薩摩うさぎ。'},
{year:'1863',phase:'尊攘派の高まり',place:'京都',regions:['kinki'],spots:['kyoto'],q:'朝廷が幕府に対して攘夷の実行を命ずる勅使として派遣した尊攘派公卿はだれか。',a:'三条実美',c:['大原重徳','岩倉具視','中山忠光'],hook:'尊攘派公卿の代表格＝三条実美。',ex:'長州藩と尊攘派公卿が結び、朝廷政治を動かすようになった。',rabbit:'images/rabbit08.png',speech:'「攘夷を実行せよ！」京都から幕府への圧力がピークへ。'}
];
let i=0,score=0,answered=false;
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(x=>x[1]);}
function start(){document.getElementById('opening').style.display='none';document.getElementById('game').style.display='grid';renderTimeline();render();}
function renderTimeline(){const t=document.getElementById('timeline');t.innerHTML='';let last='';DATA.forEach((d,k)=>{if(d.phase!==last){const ph=document.createElement('div');ph.className='phaseTitle';ph.textContent=d.phase;t.appendChild(ph);last=d.phase;}const e=document.createElement('div');e.className='event';e.id='ev'+k;e.innerHTML='<div class="year">'+d.year+'</div><div><div class="ename">'+(k<i?d.a:'？？？')+'</div><div class="place">'+d.place+'</div></div>';t.appendChild(e);});}
function render(){answered=false;const d=DATA[i];document.getElementById('count').textContent=(i+1)+'/'+DATA.length;document.getElementById('scorePill').textContent=score+'/'+DATA.length;document.getElementById('fill').style.width=(i/DATA.length*100)+'%';document.getElementById('phase').textContent=d.phase;document.getElementById('qtext').textContent=d.q;document.getElementById('hintYear').textContent=d.year;document.getElementById('hintPlace').textContent=d.place;document.getElementById('rab').src=d.rabbit;document.getElementById('speech').textContent=d.speech;document.getElementById('memory').style.display='none';document.getElementById('nextBtn').disabled=true;clearMap();paintProgress(false);renderTimeline();const choices=document.getElementById('choices');choices.innerHTML='';shuffle([d.a,...d.c]).forEach(o=>{const b=document.createElement('button');b.className='choice';b.textContent=o;b.onclick=()=>answer(b,o);choices.appendChild(b);});}
function clearMap(){document.querySelectorAll('.region').forEach(r=>r.classList.remove('active','hot'));document.querySelectorAll('.spot').forEach(s=>s.classList.remove('on'));}
function paintProgress(includeCurrent){for(let k=0;k<(includeCurrent?i+1:i);k++){DATA[k].regions.forEach(id=>document.getElementById(id)?.classList.add('active'));DATA[k].spots.forEach(id=>document.getElementById(id)?.classList.add('on'));}if(includeCurrent){DATA[i].regions.forEach(id=>document.getElementById(id)?.classList.add('hot'));DATA[i].spots.forEach(id=>document.getElementById(id)?.classList.add('on'));}}
function answer(btn,o){if(answered)return;answered=true;const d=DATA[i];document.querySelectorAll('.choice').forEach(b=>b.disabled=true);if(o===d.a){btn.classList.add('correct');score++;}else{btn.classList.add('wrong');[...document.querySelectorAll('.choice')].find(b=>b.textContent===d.a)?.classList.add('correct');}
document.getElementById('hook').textContent=d.hook;document.getElementById('explain').textContent=d.ex;document.getElementById('memory').style.display='block';document.getElementById('nextBtn').disabled=false;paintProgress(true);document.getElementById('ev'+i)?.classList.add('current','done');document.getElementById('scorePill').textContent=score+'/'+DATA.length;}
function next(){i++;if(i>=DATA.length){document.getElementById('qtext').textContent='完成！幕末の点が、線になりました。';document.getElementById('choices').innerHTML='<button class="choice correct">通常クイズへ戻る</button>';document.querySelector('.choice').onclick=()=>location.href='index.html';document.getElementById('memory').style.display='block';document.getElementById('hook').textContent='場所と時間がつながると、歴史は「暗記」から「流れ」になる。';document.getElementById('explain').textContent='江戸・京都・薩摩など、政治の圧力が複数の場所で高まり、幕末が大きく動いていく。';document.getElementById('fill').style.width='100%';paintProgress(true);document.getElementById('nextBtn').disabled=true;return;}render();}
</script>
</body>
</html>
