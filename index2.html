<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>幕末うさぎ歴史クイズ｜トレーニングモード</title>
<style>
:root{--bg:#f7fbff;--ink:#1e2733;--blue:#4b8de8;--orange:#ffb547;--green:#2e9d68;--red:#d84a4a;--card:#fff;--line:#d8e4f4;}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--ink);background:linear-gradient(180deg,#eef7ff,#fff7e8)}button,a{font:inherit}.app{min-height:100svh;padding:10px;display:flex;justify-content:center}.shell{width:min(1180px,100%);background:rgba(255,255,255,.9);border:3px solid #cde0f6;border-radius:24px;box-shadow:0 14px 38px rgba(35,68,105,.15);overflow:hidden}header{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 16px;background:#eaf5ff;border-bottom:2px solid #cde0f6}.brand{display:flex;align-items:center;gap:10px}.brand img{width:52px;height:52px;object-fit:contain}.brand h1{margin:0;font-size:clamp(19px,3vw,31px);line-height:1.1}.brand small{display:block;color:#526779;font-weight:900}.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.nav a{display:inline-flex;text-decoration:none;background:#fff;border:2px solid #b9d0eb;border-radius:999px;padding:8px 12px;color:#203044;font-weight:1000;box-shadow:0 3px 0 #9fb8d4}.nav a:active{transform:translateY(2px);box-shadow:0 1px 0 #9fb8d4}main{padding:12px}.layout{display:grid;grid-template-columns:1fr 430px;gap:12px}.panel{background:#fff;border:2px solid var(--line);border-radius:22px;padding:14px}.start{min-height:530px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#fff,#eef7ff)}.start h2{font-size:clamp(32px,5vw,58px);margin:0 0 10px;line-height:1.05}.start p{font-size:20px;font-weight:900;color:#536477;line-height:1.6;max-width:720px}.bigBtn{border:0;border-radius:18px;background:linear-gradient(135deg,#ffe08c,#ffb547);padding:14px 22px;font-weight:1000;color:#2b2118;box-shadow:0 5px 0 #c78a27;cursor:pointer}.bigBtn.sub{background:#fff;border:2px solid #cbd8e8;box-shadow:0 4px 0 #b7c6d7}.bigBtn:active{transform:translateY(3px);box-shadow:0 2px 0 #c78a27}.qBox{display:none}.qTop{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.pill{border-radius:999px;background:#eef6ff;border:2px solid #c9ddf3;padding:7px 10px;font-weight:1000;color:#33516f}.question{font-size:clamp(22px,3vw,34px);font-weight:1000;line-height:1.35;margin:10px 0 12px}.choices{display:grid;gap:9px}.choice{width:100%;text-align:left;border:3px solid #d7e2ee;background:#fff;border-radius:17px;padding:13px 14px;font-weight:1000;font-size:clamp(16px,2vw,20px);cursor:pointer}.choice.correct{border-color:var(--green);background:#eafff3}.choice.wrong{border-color:var(--red);background:#fff0f0}.feedback{display:none;margin-top:12px;border:2px solid #e5cf92;background:#fff8df;border-radius:18px;padding:12px;font-weight:900;line-height:1.55}.feedback.show{display:block}.mapPanel{display:grid;gap:10px}.phaseBox{background:#fffaf0;border:2px solid #f0d097;border-radius:18px;padding:10px}.phaseTitle{font-weight:1000;color:#a56b16;margin-bottom:6px}.timeline{position:relative;display:flex;justify-content:space-between;gap:6px;padding:18px 4px 6px;margin-top:4px}.timeline:before{content:"";position:absolute;left:20px;right:20px;top:32px;height:5px;background:#dbe7f4;border-radius:999px}.tlItem{position:relative;z-index:1;text-align:center;flex:1;font-size:11px;font-weight:900;color:#64758a}.dot{width:24px;height:24px;border:4px solid #cbd8e8;background:#fff;border-radius:50%;margin:2px auto 5px}.tlItem.done .dot{background:var(--orange);border-color:#d48515;box-shadow:0 0 0 5px rgba(255,181,71,.18)}.tlItem.current .dot{background:#4b8de8;border-color:#1d64b8;animation:pulse 1.1s infinite}@keyframes pulse{50%{transform:scale(1.16)}}.mapWrap{background:linear-gradient(180deg,#f9fdff,#eef7ff);border:2px solid #cbdff4;border-radius:20px;padding:10px;position:relative}.mapTitle{font-weight:1000;margin:0 0 8px;color:#33516f}.region{fill:#fff;stroke:#9db7d2;stroke-width:3;transition:.3s}.region.on{fill:#ffcf74}.region.hot{fill:#ff8b68}.placeLabel{font-size:12px;font-weight:900;fill:#26394d}.spark{fill:#e44242;stroke:#fff;stroke-width:3;opacity:0;transition:.3s}.spark.on{opacity:1}.rabbitTheater{display:grid;grid-template-columns:118px 1fr;gap:10px;align-items:center;background:#fff;border:2px solid #f0d097;border-radius:20px;padding:10px}.rabbitTheater img{width:110px;height:110px;object-fit:contain}.bubble{background:#fff3ce;border:3px solid #efc56d;border-radius:18px;padding:10px;font-weight:1000;line-height:1.4;position:relative}.bubble:before{content:"";position:absolute;left:-15px;top:42px;border:8px solid transparent;border-right-color:#efc56d}.progress{display:grid;gap:6px}.progressItem{border:2px solid #dbe7f4;border-radius:14px;padding:7px 9px;font-weight:900;color:#68798c;background:#fff}.progressItem.done{background:#eafff3;border-color:#8bd1ad;color:#1e714c}.progressItem.current{background:#eef6ff;border-color:#75a9e8;color:#235f9f}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.finish{display:none;text-align:center;padding:24px}.finish img{width:140px}.score{font-size:42px;font-weight:1000;color:#c57a15}@media(max-width:930px){.layout{grid-template-columns:1fr}.mapPanel{grid-template-columns:1fr}.start{min-height:auto;padding:22px 10px}.brand img{width:44px;height:44px}header{align-items:flex-start}.nav{font-size:13px}.rabbitTheater{grid-template-columns:90px 1fr}.rabbitTheater img{width:86px;height:86px}.timeline{overflow:auto}.tlItem{min-width:58px}}

/* mobile safety fix */
html,body{width:100%;max-width:100%;overflow-x:hidden;}
.shell{max-width:100%;}
.question{overflow-wrap:anywhere;word-break:break-word;}
.choice{overflow-wrap:anywhere;word-break:break-word;}
svg{max-width:100%;height:auto;}
@media(max-width:600px){
  .app{padding:6px;}
  .shell{border-radius:18px;border-width:2px;}
  header{padding:10px;gap:8px;}
  .brand h1{font-size:24px;}
  .brand small{font-size:13px;}
  .nav a{padding:7px 9px;font-size:12px;}
  main{padding:8px;}
  .panel{padding:10px;border-radius:18px;}
  .qTop{gap:6px;}
  .pill{font-size:16px;padding:6px 8px;}
  .question{font-size:24px;line-height:1.35;}
  .choice{font-size:18px;padding:12px;}
  .timeline{padding-left:0;padding-right:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .timeline:before{left:14px;right:14px;}
  .tlItem{min-width:52px;font-size:10px;}
}

</style>
</head>
<body>
<div class="app"><div class="shell"><header><div class="brand"><img src="images/rabbit16.png" onerror="this.style.display='none'" alt="うさぎ"><div><h1>トレーニングモード</h1><small>時系列と場所で、点を線にする</small></div></div><nav class="nav"><a href="index.html">通常クイズへ</a><a href="index3.html">アドバンストレーニング</a></nav></header><main>
<section id="start" class="panel start"><h2>歴史の流れを<br>完成させよう</h2><p>問題は時系列順に出ます。正解すると、時系列の点が光り、日本地図の発生場所に色がつきます。最後には、幕末の動きが一本の線になります。</p><button class="bigBtn" onclick="startTraining()">トレーニング開始</button></section>
<section id="train" class="qBox"><div class="layout"><div class="panel"><div class="qTop"><span id="step" class="pill"></span><span id="year" class="pill"></span><span id="place" class="pill"></span></div><div id="question" class="question"></div><div id="choices" class="choices"></div><div id="feedback" class="feedback"></div><div class="actions"><button id="nextBtn" class="bigBtn" onclick="nextStep()" style="display:none">次へ</button><button class="bigBtn sub" onclick="restart()">最初から</button><button class="bigBtn sub" onclick="location.href='index.html'">通常クイズへ</button></div></div><aside class="mapPanel"><div class="phaseBox"><div class="phaseTitle" id="phaseTitle">開国の衝撃</div><div class="timeline" id="timeline"></div></div><div class="mapWrap"><p class="mapTitle">出来事が起こった場所</p><svg viewBox="0 0 360 250" width="100%" aria-label="学習用模式日本地図"><path id="hokkaido" class="region" d="M250 20 L326 28 L338 70 L300 92 L250 78 L226 48 Z"/><path id="tohoku" class="region" d="M230 82 L295 96 L282 155 L236 158 L212 120 Z"/><path id="kanto" class="region" d="M210 150 L264 154 L282 195 L228 214 L190 188 Z"/><path id="chubu" class="region" d="M138 132 L210 148 L190 190 L126 198 L95 166 Z"/><path id="kinki" class="region" d="M78 150 L132 142 L126 198 L72 202 L45 178 Z"/><path id="chugoku" class="region" d="M20 142 L80 150 L45 178 L10 170 Z"/><path id="shikoku" class="region" d="M48 205 L112 207 L100 230 L42 226 Z"/><path id="kyushu" class="region" d="M5 182 L48 186 L56 235 L22 248 L-2 220 Z"/><circle id="p-uraga" class="spark" cx="242" cy="190" r="8"/><circle id="p-shimoda" class="spark" cx="220" cy="208" r="8"/><circle id="p-hakodate" class="spark" cx="275" cy="78" r="8"/><circle id="p-edo" class="spark" cx="238" cy="178" r="8"/><circle id="p-kyoto" class="spark" cx="95" cy="174" r="8"/><circle id="p-namamugi" class="spark" cx="232" cy="190" r="8"/><circle id="p-kagoshima" class="spark" cx="26" cy="226" r="8"/><circle id="p-shimonoseki" class="spark" cx="34" cy="158" r="8"/><text x="246" y="184" class="placeLabel">江戸</text><text x="210" y="225" class="placeLabel">下田</text><text x="282" y="66" class="placeLabel">箱館</text><text x="88" y="168" class="placeLabel">京都</text><text x="18" y="244" class="placeLabel">鹿児島</text><text x="14" y="150" class="placeLabel">下関</text></svg></div><div class="rabbitTheater"><img id="rabbit" src="images/rabbit01.png" alt="うさぎ"><div class="bubble" id="bubble">うさぎ劇がここに出ます。</div></div><div class="panel progress" id="progress"></div></aside></div></section>
<section id="finish" class="panel finish"><img src="images/rabbit14.png" onerror="this.src='images/rabbit01.png'" alt="うさぎ"><h2>流れ完成！</h2><div class="score" id="finishScore"></div><p>点だった出来事が、場所と時系列で一本の線になりました。</p><button class="bigBtn" onclick="restart()">もう一度</button> <button class="bigBtn sub" onclick="location.href='index.html'">通常クイズへ</button></section>
</main></div></div>
<script>
const EVENTS=[
{id:'perry',phase:'開国の衝撃',year:'1853',place:'浦賀',region:['kanto'],spark:['p-uraga'],q:'1853年に浦賀へ来航し、開国を求めたアメリカの人物は？',a:'ペリー',c:['ハリス','プチャーチン','井伊直弼'],rabbit:'rabbit11.png',bubble:'黒船うさぎ「開国してくださーい！」幕府うさぎ「急すぎる！」',memo:'ここから幕府は、外国への対応を迫られ始める。'},
{id:'washin',phase:'開国の衝撃',year:'1854',place:'神奈川・下田・箱館',region:['kanto','chubu','hokkaido'],spark:['p-shimoda','p-hakodate'],q:'下田・箱館を開港した、1854年の条約は？',a:'日米和親条約',c:['日米修好通商条約','安政の五カ国条約','日露和親条約'],rabbit:'rabbit06.png',bubble:'幕府うさぎ「まずは港だけ…」外国うさぎ「第一段階クリア！」',memo:'この段階は、まだ本格的な貿易ではない。'},
{id:'tsusho',phase:'通商条約と不平等',year:'1858',place:'江戸・神奈川など',region:['kanto','chubu'],spark:['p-edo','p-shimoda'],q:'ハリスとの間で結ばれ、貿易開始につながった条約は？',a:'日米修好通商条約',c:['日米和親条約','ポーツマス条約','下関条約'],rabbit:'rabbit08.png',bubble:'ハリスうさぎ「貿易を始めましょう」幕府うさぎ「でも条件が不利…」',memo:'領事裁判権など、不平等条約として覚える。'},
{id:'taigoku',phase:'幕府への反発',year:'1858-1859',place:'江戸・京都',region:['kanto','kinki'],spark:['p-edo','p-kyoto'],q:'井伊直弼が反対派を厳しく処罰した事件は？',a:'安政の大獄',c:['桜田門外の変','禁門の変','生麦事件'],rabbit:'rabbit10.png',bubble:'井伊うさぎ「反対派は処分！」周りのうさぎ「空気が重い…」',memo:'強い弾圧は、さらに強い反発を生む。'},
{id:'sakuradamon',phase:'幕府への反発',year:'1860',place:'江戸城桜田門',region:['kanto'],spark:['p-edo'],q:'井伊直弼が水戸浪士らに暗殺された事件は？',a:'桜田門外の変',c:['安政の大獄','坂下門外の変','大政奉還'],rabbit:'rabbit05.png',bubble:'雪の日、井伊うさぎ「え!?」水戸うさぎ「許さん！」',memo:'安政の大獄への反発が、事件として爆発した。'},
{id:'kobugattai',phase:'公武合体と尊攘',year:'1862',place:'京都・江戸',region:['kanto','kinki'],spark:['p-edo','p-kyoto'],q:'朝廷と幕府を結びつけ、政治の安定をめざした政策は？',a:'公武合体',c:['尊王攘夷','版籍奉還','廃藩置県'],rabbit:'rabbit04.png',bubble:'朝廷うさぎと幕府うさぎ「とりあえず手を組もう」',memo:'幕府が揺れる中、朝廷の権威を利用して安定を図った。'},
{id:'namamugi',phase:'尊王攘夷の高まり',year:'1862',place:'生麦（神奈川）',region:['kanto'],spark:['p-namamugi'],q:'薩英戦争の原因となった、イギリス人殺傷事件は？',a:'生麦事件',c:['桜田門外の変','下関戦争','蛤御門の変'],rabbit:'rabbit12.png',bubble:'生麦うさぎ「道中で大事件！」国際問題へ発展！',memo:'一つの事件が、藩と外国の戦争につながる。'},
{id:'satuei',phase:'尊王攘夷の高まり',year:'1863',place:'鹿児島湾',region:['kyushu'],spark:['p-kagoshima'],q:'生麦事件をきっかけに起こった、薩摩藩とイギリスの戦争は？',a:'薩英戦争',c:['下関戦争','戊辰戦争','西南戦争'],rabbit:'rabbit07.png',bubble:'薩摩うさぎ「攘夷！」→「イギリス強すぎ…学ぼう」',memo:'薩摩は西洋の強さを知り、考えを変えていく。'},
{id:'shimonoseki',phase:'尊王攘夷の高まり',year:'1863-1864',place:'下関',region:['chugoku'],spark:['p-shimonoseki'],q:'長州藩が外国船を砲撃したことから起こった戦争は？',a:'下関戦争',c:['薩英戦争','箱館戦争','鳥羽・伏見の戦い'],rabbit:'rabbit15.png',bubble:'長州うさぎ「外国船を撃て！」→「反撃が強すぎる！」',memo:'長州も西洋の力を痛感する。'},
{id:'reform',phase:'幕府改革',year:'1866',place:'全国',region:['kanto','kinki','chugoku','kyushu'],spark:['p-edo','p-kyoto','p-shimonoseki','p-kagoshima'],q:'江戸幕府が行った最後の大きな改革は？',a:'慶応の改革',c:['享保の改革','寛政の改革','天保の改革'],rabbit:'rabbit03.png',bubble:'幕府うさぎ「まだ立て直す！」でも時代の流れは大きく動いていた。',memo:'幕府は立て直しを図るが、倒幕への流れは強まっていく。'}
];
let i=0,score=0,answered=false,done=[];
function shuffle(a){return [...a].sort(()=>Math.random()-0.5)}
function startTraining(){document.getElementById('start').style.display='none';document.getElementById('finish').style.display='none';document.getElementById('train').style.display='block';i=0;score=0;done=[];clearMap();renderTimeline();renderProgress();load()}
function restart(){startTraining()}
function clearMap(){document.querySelectorAll('.region,.spark').forEach(e=>e.classList.remove('on','hot'))}
function renderTimeline(){const t=document.getElementById('timeline');t.innerHTML='';EVENTS.forEach((e,n)=>{const div=document.createElement('div');div.className='tlItem '+(done.includes(n)?'done':n===i?'current':'');const label=done.includes(n)?e.a:'？？？';div.innerHTML=`<div class="dot"></div><div>${e.year}</div><div>${label}</div>`;t.appendChild(div)});document.getElementById('phaseTitle').textContent=EVENTS[i]?.phase||'完成'}
function renderProgress(){const p=document.getElementById('progress');p.innerHTML='';EVENTS.forEach((e,n)=>{const div=document.createElement('div');div.className='progressItem '+(done.includes(n)?'done':n===i?'current':'');const text=done.includes(n)?`${e.year}｜${e.a}｜${e.place}`:(n===i?`${e.year}｜挑戦中｜${e.place}`:`${e.year}｜？？？｜${e.place}`);div.textContent=text;p.appendChild(div)})}
function light(e,hot=false){e.region.forEach(id=>document.getElementById(id)?.classList.add(hot?'hot':'on'));e.spark.forEach(id=>document.getElementById(id)?.classList.add('on'))}
function load(){answered=false;const e=EVENTS[i];renderTimeline();renderProgress();light(e,true);document.getElementById('step').textContent=`${i+1} / ${EVENTS.length}`;document.getElementById('year').textContent=e.year;document.getElementById('place').textContent=`場所：${e.place}`;document.getElementById('question').textContent=e.q;document.getElementById('rabbit').src='images/rabbit01.png';document.getElementById('bubble').textContent='この出来事は、どこで、何年ごろ起こった？';document.getElementById('feedback').className='feedback';document.getElementById('feedback').innerHTML='';document.getElementById('nextBtn').style.display='none';const box=document.getElementById('choices');box.innerHTML='';shuffle([e.a,...e.c]).forEach(x=>{const b=document.createElement('button');b.className='choice';b.textContent=x;b.onclick=()=>answer(b,x,e);box.appendChild(b)})}
function answer(btn,x,e){if(answered)return;answered=true;document.querySelectorAll('.choice').forEach(b=>{b.disabled=true;if(b.textContent===e.a)b.classList.add('correct')});const ok=x===e.a;if(!ok)btn.classList.add('wrong');if(ok)score++;done.push(i);clearMap();EVENTS.slice(0,i+1).forEach((ev,n)=>light(ev,n===i));renderTimeline();renderProgress();document.getElementById('rabbit').src='images/'+(ok?e.rabbit:'rabbit09.png');document.getElementById('bubble').textContent=e.bubble;const f=document.getElementById('feedback');f.className='feedback show';f.innerHTML=`<b>${ok?'正解！':'惜しい！'} 答え：${e.a}</b><br>📍 場所：${e.place}<br>🧭 流れ：${e.memo}<br>🐰 ${e.bubble}`;document.getElementById('nextBtn').style.display='inline-block';document.getElementById('nextBtn').textContent=i===EVENTS.length-1?'完成を見る':'次の出来事へ'}
function nextStep(){i++;if(i>=EVENTS.length){finish()}else{load()}}
function finish(){document.getElementById('train').style.display='none';document.getElementById('finish').style.display='block';document.getElementById('finishScore').textContent=`${score} / ${EVENTS.length}`}
</script>
</body>
</html>
